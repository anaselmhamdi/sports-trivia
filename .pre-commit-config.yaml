repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=50000']  # Allow large JSON data files
      - id: check-merge-conflict

  # Keep this rev in sync with the `ruff` pin in backend/pyproject.toml so the
  # pre-commit hook and the CI `ruff format --check` command agree on rules.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.14
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
